<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Filter Buttons */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 25px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: capitalize;
        }

        .filter-btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            height: 250px;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay-icon {
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
        }

        .gallery-item.hidden {
            display: none;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            display: block;
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.3s ease;
        }

        .close-btn:hover {
            transform: rotate(90deg);
        }

        .prev-btn, .next-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: none;
            font-size: 2rem;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .prev-btn:hover, .next-btn:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn {
            left: -80px;
        }

        .next-btn {
            right: -80px;
        }

        .lightbox-counter {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .gallery-item {
                height: 150px;
            }

            .filter-section {
                gap: 10px;
            }

            .filter-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }

            .prev-btn, .next-btn {
                font-size: 1.5rem;
                padding: 10px 15px;
            }

            .prev-btn {
                left: -60px;
            }

            .next-btn {
                right: -60px;
            }

            .lightbox-content {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 10px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }

            .gallery-item {
                height: 120px;
            }

            .prev-btn, .next-btn {
                font-size: 1.2rem;
                padding: 8px 12px;
                left: 10px;
                right: auto;
            }

            .next-btn {
                left: auto;
                right: 10px;
            }

            .close-btn {
                top: 10px;
            }

            .filter-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }

        /* Loading animation */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .gallery-item.loading {
            animation: pulse 1.5s infinite;
        }

        /* No results message */
        .no-results {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Image Gallery</h1>
            <p>Explore our beautiful collection</p>
        </header>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="city">City</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
            <button class="filter-btn" data-filter="abstract">Abstract</button>
        </div>

        <div class="gallery" id="gallery">
            <!-- Gallery items will be inserted here -->
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" id="closeBtn">&times;</button>
        <div class="lightbox-content">
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
            <button class="prev-btn" id="prevBtn">❮</button>
            <button class="next-btn" id="nextBtn">❯</button>
            <div class="lightbox-counter">
                <span id="currentImage">1</span> / <span id="totalImages">1</span>
            </div>
        </div>
    </div>

    <script>
        // Sample images with categories (replace with your own images)
        const images = [
            // NATURE - 12 images
            { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop', category: 'nature', title: 'Mountain Peak' },
            { src: 'https://images.unsplash.com/photo-1469022563149-aa64dbd37dae?w=500&h=500&fit=crop', category: 'nature', title: 'Forest' },
            { src: 'https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=500&h=500&fit=crop', category: 'nature', title: 'Ocean Waves' },
            { src: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe3e?w=500&h=500&fit=crop', category: 'nature', title: 'Green Field' },
            { src: 'https://images.unsplash.com/photo-1511379938547-c1f69b13d835?w=500&h=500&fit=crop', category: 'nature', title: 'Sunset' },
            { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop', category: 'nature', title: 'Alpine Mountains' },
            { src: 'https://images.unsplash.com/photo-1433838552652-f9a46b332c40?w=500&h=500&fit=crop', category: 'nature', title: 'Desert Dunes' },
            { src: 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=500&h=500&fit=crop', category: 'nature', title: 'Misty Mountains' },
            { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop', category: 'nature', title: 'Snowy Peaks' },
            { src: 'https://images.unsplash.com/photo-1490442537025-dbb6af6ac6ca?w=500&h=500&fit=crop', category: 'nature', title: 'Waterfall' },
            { src: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&h=500&fit=crop', category: 'nature', title: 'Forest Path' },
            { src: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&h=500&fit=crop', category: 'nature', title: 'Nature Landscape' },

            // CITY - 10 images
            { src: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=500&h=500&fit=crop', category: 'city', title: 'City Lights' },
            { src: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=500&h=500&fit=crop', category: 'city', title: 'Urban Street' },
            { src: 'https://images.unsplash.com/photo-1577720643272-265e434c1df0?w=500&h=500&fit=crop', category: 'city', title: 'Modern Building' },
            { src: 'https://images.unsplash.com/photo-1508707185212-d4dc5ebe6122?w=500&h=500&fit=crop', category: 'city', title: 'Downtown' },
            { src: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=500&h=500&fit=crop', category: 'city', title: 'Night City' },
            { src: 'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=500&h=500&fit=crop', category: 'city', title: 'City Architecture' },
            { src: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=500&h=500&fit=crop', category: 'city', title: 'Urban Landscape' },
            { src: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=500&h=500&fit=crop', category: 'city', title: 'Street Photography' },
            { src: 'https://images.unsplash.com/photo-1513721032312-6a18a42c8763?w=500&h=500&fit=crop', category: 'city', title: 'Cityscape' },
            { src: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=500&h=500&fit=crop', category: 'city', title: 'Metro City' },

            // ANIMALS - 9 images
            { src: 'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=500&h=500&fit=crop', category: 'animals', title: 'Lion' },
            { src: 'https://images.unsplash.com/photo-1444464666175-1642920591713?w=500&h=500&fit=crop', category: 'animals', title: 'Eagle' },
            { src: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=500&h=500&fit=crop', category: 'animals', title: 'Wolf' },
            { src: 'https://images.unsplash.com/photo-1456926631375-92c8ce872def?w=500&h=500&fit=crop', category: 'animals', title: 'Polar Bear' },
            { src: 'https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=500&h=500&fit=crop', category: 'animals', title: 'Elephant' },
            { src: 'https://images.unsplash.com/photo-1515956969256-18b4d93cf965?w=500&h=500&fit=crop', category: 'animals', title: 'Dolphins' },
            { src: 'https://images.unsplash.com/photo-1551782643-c40495e2de11?w=500&h=500&fit=crop', category: 'animals', title: 'Tiger' },
            { src: 'https://images.unsplash.com/photo-1589941013453-ec89f33b5e95?w=500&h=500&fit=crop', category: 'animals', title: 'Giraffe' },
            { src: 'https://images.unsplash.com/photo-1520763185298-1b434c919abe?w=500&h=500&fit=crop', category: 'animals', title: 'Lion King' },

            // ABSTRACT - 9 images
            { src: 'https://images.unsplash.com/photo-1462331940975-bee44b8b5181?w=500&h=500&fit=crop', category: 'abstract', title: 'Abstract Art 1' },
            { src: 'https://images.unsplash.com/photo-1509945159669-a11e6c0edce8?w=500&h=500&fit=crop', category: 'abstract', title: 'Abstract Art 2' },
            { src: 'https://images.unsplash.com/photo-1549887534-7ebf0b70959e?w=500&h=500&fit=crop', category: 'abstract', title: 'Colorful Abstract' },
            { src: 'https://images.unsplash.com/photo-1560893676-04071c5f467b?w=500&h=500&fit=crop', category: 'abstract', title: 'Digital Art' },
            { src: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=500&h=500&fit=crop', category: 'abstract', title: 'Modern Art' },
            { src: 'https://images.unsplash.com/photo-1549887534-7ebf0b70959e?w=500&h=500&fit=crop', category: 'abstract', title: 'Geometric Design' },
            { src: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=500&h=500&fit=crop', category: 'abstract', title: 'Abstract Pattern' },
            { src: 'https://images.unsplash.com/photo-1549887534-7ebf0b70959e?w=500&h=500&fit=crop', category: 'abstract', title: 'Neon Art' },
            { src: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=500&h=500&fit=crop', category: 'abstract', title: 'Contemporary Art' },
        ];

        let currentImageIndex = 0;
        let filteredImages = [...images];

        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const closeBtn = document.getElementById('closeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const currentImageSpan = document.getElementById('currentImage');
        const totalImagesSpan = document.getElementById('totalImages');

        // Initialize gallery
        function initGallery() {
            renderGallery(images);
        }

        // Render gallery items
        function renderGallery(imagesToRender) {
            gallery.innerHTML = '';
            
            if (imagesToRender.length === 0) {
                gallery.innerHTML = '<div class="no-results">No images found</div>';
                return;
            }

            imagesToRender.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${image.src}" alt="${image.title}" loading="lazy">
                    <div class="overlay">
                        <span class="overlay-icon">🔍</span>
                    </div>
                `;
                item.addEventListener('click', () => openLightbox(imagesToRender, index));
                gallery.appendChild(item);
            });
        }

        // Filter gallery
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;
                if (filter === 'all') {
                    filteredImages = [...images];
                } else {
                    filteredImages = images.filter(img => img.category === filter);
                }
                renderGallery(filteredImages);
            });
        });

        // Lightbox functions
        function openLightbox(imageArray, index) {
            currentImageIndex = index;
            filteredImages = imageArray;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            if (filteredImages.length === 0) return;
            lightboxImg.src = filteredImages[currentImageIndex].src;
            lightboxImg.alt = filteredImages[currentImageIndex].title;
            currentImageSpan.textContent = currentImageIndex + 1;
            totalImagesSpan.textContent = filteredImages.length;
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % filteredImages.length;
            updateLightbox();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + filteredImages.length) % filteredImages.length;
            updateLightbox();
        }

        // Event listeners
        closeBtn.addEventListener('click', closeLightbox);
        nextBtn.addEventListener('click', nextImage);
        prevBtn.addEventListener('click', prevImage);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // Close lightbox on outside click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Initialize
        initGallery();
    </script>
</body>
</html>
